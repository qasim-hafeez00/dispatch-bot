# alembic.ini — Database Migration Configuration
# 
# Alembic tracks schema changes to your database.
# Think of it like "git for your database structure".
#
# Run migrations: alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"

[alembic]
script_location = cortexbot/db/migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# Uses DATABASE_URL_SYNC from environment
# (Alembic needs the sync version, not async)
sqlalchemy.url = %(DATABASE_URL_SYNC)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
